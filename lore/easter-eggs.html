<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easter Egg Tracker | HEEZO Lore</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            color: #e0e0e0;
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
        }

        /* NAV */
        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            background: rgba(10, 10, 15, 0.95);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo {
            font-size: 24px;
            font-weight: 700;
            color: #d4af37;
            text-decoration: none;
            letter-spacing: 2px;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .nav-links a {
            color: #999;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: #d4af37;
        }

        /* MAIN CONTAINER */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        /* HEADER / STATS */
        .page-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .page-header h1 {
            font-size: 36px;
            color: #d4af37;
            margin-bottom: 8px;
        }

        .page-header p {
            color: #888;
            font-size: 14px;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-bottom: 32px;
            padding: 16px;
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 12px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-item .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: #d4af37;
        }

        .stat-item .stat-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* SEARCH */
        .search-wrap {
            margin-bottom: 24px;
        }

        .search-wrap input {
            width: 100%;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 10px;
            color: #e0e0e0;
            font-size: 15px;
            font-family: 'Space Grotesk', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-wrap input:focus {
            border-color: #d4af37;
        }

        .search-wrap input::placeholder {
            color: #666;
        }

        /* FILTERS */
        .filter-section {
            margin-bottom: 24px;
        }

        .filter-group {
            margin-bottom: 12px;
        }

        .filter-group-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .filter-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .pill {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.03);
            color: #aaa;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Space Grotesk', sans-serif;
        }

        .pill:hover {
            border-color: rgba(212, 175, 55, 0.5);
            color: #d4af37;
        }

        .pill.active {
            background: rgba(212, 175, 55, 0.15);
            border-color: #d4af37;
            color: #d4af37;
        }

        /* SPOILER TOGGLE */
        .toggle-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .toggle-wrap label {
            font-size: 14px;
            color: #ccc;
            cursor: pointer;
        }

        .toggle-switch {
            width: 44px;
            height: 24px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
        }

        .toggle-switch.on {
            background: rgba(212, 175, 55, 0.4);
        }

        .toggle-switch .toggle-knob {
            width: 20px;
            height: 20px;
            background: #e0e0e0;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: transform 0.2s;
        }

        .toggle-switch.on .toggle-knob {
            transform: translateX(20px);
            background: #d4af37;
        }

        /* GRID */
        .egg-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 48px;
        }

        @media (max-width: 900px) {
            .egg-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .egg-grid {
                grid-template-columns: 1fr;
            }
            .nav {
                padding: 12px 16px;
            }
            .nav-links {
                gap: 12px;
            }
            .stats-bar {
                gap: 16px;
            }
        }

        .egg-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 20px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            position: relative;
        }

        .egg-card:hover {
            transform: translateY(-3px);
            border-color: rgba(212, 175, 55, 0.3);
        }

        .egg-card.diff-easy:hover {
            box-shadow: 0 8px 32px rgba(74, 222, 128, 0.15);
        }

        .egg-card.diff-medium:hover {
            box-shadow: 0 8px 32px rgba(245, 158, 11, 0.15);
        }

        .egg-card.diff-hard:hover {
            box-shadow: 0 8px 32px rgba(239, 68, 68, 0.15);
        }

        .egg-card.diff-insane:hover {
            box-shadow: 0 8px 32px rgba(168, 85, 247, 0.15);
        }

        .egg-card.found {
            border-color: rgba(212, 175, 55, 0.4);
            background: rgba(212, 175, 55, 0.05);
        }

        .card-franchise {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 8px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #e0e0e0;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .card-teaser {
            font-size: 13px;
            color: #777;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .card-teaser.blurred {
            filter: blur(5px);
            user-select: none;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-difficulty {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 10px;
            border-radius: 6px;
        }

        .diff-badge-easy {
            color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
        }

        .diff-badge-medium {
            color: #f59e0b;
            background: rgba(245, 158, 11, 0.1);
        }

        .diff-badge-hard {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        .diff-badge-insane {
            color: #a855f7;
            background: rgba(168, 85, 247, 0.1);
        }

        .card-type {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-found-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 16px;
        }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .modal-overlay.visible {
            display: flex;
        }

        .modal-content {
            background: rgba(20, 20, 30, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 18px;
            padding: 32px;
            max-width: 600px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 24px;
            color: #888;
            cursor: pointer;
            background: none;
            border: none;
            font-family: 'Space Grotesk', sans-serif;
            line-height: 1;
            padding: 4px 8px;
            border-radius: 4px;
            transition: color 0.2s, background 0.2s;
        }

        .modal-close:hover {
            color: #d4af37;
            background: rgba(212, 175, 55, 0.1);
        }

        .modal-franchise {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #d4af37;
            margin-bottom: 8px;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 700;
            color: #e0e0e0;
            margin-bottom: 16px;
        }

        .modal-badges {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .modal-badge {
            font-size: 11px;
            padding: 5px 12px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .modal-section {
            margin-bottom: 20px;
        }

        .modal-section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 8px;
        }

        .modal-section-text {
            font-size: 14px;
            color: #ccc;
            line-height: 1.7;
        }

        .modal-section-text.blurred {
            filter: blur(5px);
            user-select: none;
        }

        .modal-related {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .related-tag {
            padding: 6px 14px;
            background: rgba(212, 175, 55, 0.08);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 8px;
            font-size: 12px;
            color: #d4af37;
            cursor: pointer;
            transition: background 0.2s;
        }

        .related-tag:hover {
            background: rgba(212, 175, 55, 0.2);
        }

        .modal-found-btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin-top: 24px;
            border-radius: 10px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            background: rgba(212, 175, 55, 0.08);
            color: #d4af37;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Space Grotesk', sans-serif;
            transition: background 0.2s;
        }

        .modal-found-btn:hover {
            background: rgba(212, 175, 55, 0.15);
        }

        .modal-found-btn.is-found {
            background: rgba(212, 175, 55, 0.25);
            border-color: #d4af37;
        }

        /* NO RESULTS */
        .no-results {
            text-align: center;
            padding: 48px 24px;
            color: #666;
            font-size: 15px;
            grid-column: 1 / -1;
        }
    </style>
</head>

        <!-- GRID -->
        <div class="egg-grid" id="egg-grid"></div>

    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">

            <div id="modal-body"></div>

    /* =============================================
       STATE VARIABLES
       ============================================= */
    var currentFranchise = "all";
    var currentDifficulty = "all";
    var currentType = "all";
    var searchQuery = "";
    var spoilersVisible = false;
    var foundEggs = {};

    /* =============================================
       INIT
       ============================================= */
    function init() {
        loadFoundEggs();
        renderGrid();
        updateStats();
    }

    /* =============================================
       LOCAL STORAGE
       ============================================= */
    function loadFoundEggs() {
        try {
            var stored = localStorage.getItem("heezo_found_eggs");
            if (stored) {
                foundEggs = JSON.parse(stored);
            }
        } catch (e) {
            foundEggs = {};
        }
    }

    function saveFoundEggs() {
        try {
            localStorage.setItem("heezo_found_eggs", JSON.stringify(foundEggs));
        } catch (e) {
            // silent fail
        }
    }

    /* =============================================
       STATS
       ============================================= */
    function updateStats() {
        var total = eggs.length;
        var found = 0;
        for (var i = 0; i < eggs.length; i++) {
            if (foundEggs[eggs[i].id]) {
                found++;
            }
        }
        var percent = total > 0 ? Math.round((found / total) * 100) : 0;

        document.getElementById("stat-total").textContent = total;
        document.getElementById("stat-found").textContent = found;
        document.getElementById("stat-percent").textContent = percent + "%";
    }

    /* =============================================
       FILTERS
       ============================================= */
    function setFranchise(value) {
        currentFranchise = value;
        updatePillStates("franchise-filters", value);
        renderGrid();
    }

    function setDifficulty(value) {
        currentDifficulty = value;
        updatePillStates("difficulty-filters", value);
        renderGrid();
    }

    function setType(value) {
        currentType = value;
        updatePillStates("type-filters", value);
        renderGrid();
    }

    function updatePillStates(containerId, activeValue) {
        var container = document.getElementById(containerId);
        var pills = container.getElementsByClassName("pill");
        for (var i = 0; i < pills.length; i++) {
            pills[i].classList.remove("active");
        }
        // Find the matching pill
        for (var i = 0; i < pills.length; i++) {
            var pillText = pills[i].textContent.trim();
            if (activeValue === "all" && pillText === "All") {
                pills[i].classList.add("active");
            } else if (pillText.toLowerCase() === activeValue.toLowerCase()) {
                pills[i].classList.add("active");
            }
        }
    }

    /* =============================================
       SEARCH
       ============================================= */
    function handleSearch() {
        var input = document.getElementById("search-input");
        searchQuery = input.value.toLowerCase().trim();
        renderGrid();
    }

    /* =============================================
       SPOILER TOGGLE
       ============================================= */
    function toggleSpoilers() {
        spoilersVisible = !spoilersVisible;
        var toggle = document.getElementById("spoiler-toggle");
        if (spoilersVisible) {
            toggle.classList.add("on");
        } else {
            toggle.classList.remove("on");
        }
        renderGrid();
        // Also update modal if open
        updateModalSpoilers();
    }

    function updateModalSpoilers() {
        var overlay = document.getElementById("modal-overlay");
        if (overlay.classList.contains("visible")) {
            var spoilerEls = overlay.querySelectorAll(".modal-section-text");
            for (var i = 0; i < spoilerEls.length; i++) {
                if (spoilersVisible) {
                    spoilerEls[i].classList.remove("blurred");
                } else {
                    if (spoilerEls[i].getAttribute("data-spoiler") === "true") {
                        spoilerEls[i].classList.add("blurred");
                    }
                }
            }
        }
    }

    /* =============================================
       RENDER GRID
       ============================================= */
    function getFilteredEggs() {
        var filtered = [];
        for (var i = 0; i < eggs.length; i++) {
            var egg = eggs[i];
            // Franchise filter
            if (currentFranchise !== "all" && egg.franchise !== currentFranchise) {
                continue;
            }
            // Difficulty filter
            if (currentDifficulty !== "all" && egg.difficulty !== currentDifficulty) {
                continue;
            }
            // Type filter
            if (currentType !== "all" && egg.type !== currentType) {
                continue;
            }
            // Search filter
            if (searchQuery !== "" && egg.title.toLowerCase().indexOf(searchQuery) === -1) {
                continue;
            }
            filtered.push(egg);
        }
        return filtered;
    }

    function renderGrid() {
        var grid = document.getElementById("egg-grid");
        var filtered = getFilteredEggs();

        if (filtered.length === 0) {
            grid.innerHTML = '<div class="no-results">No easter eggs match your filters. Try adjusting your search or filters.</div>';
            return;
        }

        var html = "";
        for (var i = 0; i < filtered.length; i++) {
            var egg = filtered[i];
            var isFound = foundEggs[egg.id] ? true : false;
            var cardClass = "egg-card diff-" + egg.difficulty;
            if (isFound) {
                cardClass += " found";
            }

            var blurClass = spoilersVisible ? "card-teaser" : "card-teaser blurred";

            html += '<div class="' + cardClass + '" onclick="openModal(' + egg.id + ')">';
            if (isFound) {
                html += '<div class="card-found-badge">&#9734;</div>';
            }
            html += '<div class="card-franchise">' + egg.franchise + '</div>';
            html += '<div class="card-title">' + egg.title + '</div>';
            html += '<div class="' + blurClass + '">' + egg.teaser + '</div>';
            html += '<div class="card-meta">';
            html += '<span class="card-difficulty diff-badge-' + egg.difficulty + '">' + egg.difficulty + '</span>';
            html += '<span class="card-type">' + egg.type + '</span>';
            html += '</div>';
            html += '</div>';
        }

        grid.innerHTML = html;
    }

    /* =============================================
       MODAL
       ============================================= */
    function openModal(id) {
        var egg = null;
        for (var i = 0; i < eggs.length; i++) {
            if (eggs[i].id === id) {
                egg = eggs[i];
                break;
            }
        }
        if (!egg) return;

        var isFound = foundEggs[egg.id] ? true : false;
        var blurClass = spoilersVisible ? "modal-section-text" : "modal-section-text blurred";

        var html = "";
        html += '<div class="modal-franchise">' + egg.franchise + ' &bull; ' + egg.source + '</div>';
        html += '<div class="modal-title">' + egg.title + '</div>';

        html += '<div class="modal-badges">';
        html += '<span class="modal-badge diff-badge-' + egg.difficulty + '">' + egg.difficulty + '</span>';
        html += '<span class="modal-badge" style="color:#888;background:rgba(255,255,255,0.05);">' + egg.type + '</span>';
        html += '</div>';

        html += '<div class="modal-section">';
        html += '<div class="modal-section-title">Description</div>';
        html += '<div class="' + blurClass + '" data-spoiler="true">' + egg.description + '</div>';
        html += '</div>';

        html += '<div class="modal-section">';
        html += '<div class="modal-section-title">Reference</div>';
        html += '<div class="' + blurClass + '" data-spoiler="true">' + egg.reference + '</div>';
        html += '</div>';

        // Related eggs
        if (egg.related && egg.related.length > 0) {
            html += '<div class="modal-section">';
            html += '<div class="modal-section-title">Related Easter Eggs</div>';
            html += '<div class="modal-related">';
            for (var j = 0; j < egg.related.length; j++) {
                var relatedId = egg.related[j];
                var relatedEgg = null;
                for (var k = 0; k < eggs.length; k++) {
                    if (eggs[k].id === relatedId) {
                        relatedEgg = eggs[k];
                        break;
                    }
                }
                if (relatedEgg) {
                    html += '<div class="related-tag" onclick="openModal(' + relatedEgg.id + ')">' + relatedEgg.title + '</div>';
                }
            }
            html += '</div>';
            html += '</div>';
        }

        // Found button
        var btnClass = isFound ? "modal-found-btn is-found" : "modal-found-btn";
        var btnText = isFound ? "&#9734; Found! (Click to Unmark)" : "Mark as Found";
        html += '<button class="' + btnClass + '" onclick="toggleFound(' + egg.id + ')">' + btnText + '</button>';

        document.getElementById("modal-body").innerHTML = html;
        document.getElementById("modal-overlay").classList.add("visible");
        document.body.style.overflow = "hidden";
    }

    function closeModal() {
        document.getElementById("modal-overlay").classList.remove("visible");
        document.body.style.overflow = "";
    }

    function handleOverlayClick(event) {
        if (event.target === document.getElementById("modal-overlay")) {
            closeModal();
        }
    }

    /* =============================================
       FOUND TOGGLE
       ============================================= */
    function toggleFound(id) {
        if (foundEggs[id]) {
            delete foundEggs[id];
        } else {
            foundEggs[id] = true;
        }
        saveFoundEggs();
        updateStats();
        renderGrid();
        // Re-open modal to refresh button state
        openModal(id);
    }

    /* =============================================
       START
       ============================================= */
    init();
    </script>
