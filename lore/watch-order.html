<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Order Generator — Heezo</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a25;--gold:#d4af37;--gold-light:#f4d03f;--gold-dim:#8b7320;--text:#e8e8e8;--text-dim:#888;--glass:rgba(20,20,30,0.7);--glass-border:rgba(212,175,55,0.15);--glass-border-hover:rgba(212,175,55,0.4);--radius:16px;--transition:0.3s cubic-bezier(0.4,0,0.2,1)}
html{scroll-behavior:smooth}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;position:relative}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;opacity:0.035;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E")}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:3px}
#particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
#app{position:relative;z-index:1;min-height:100vh}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,15,0.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--glass-border)}
.nav-brand{font-size:13px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:2.5px;text-decoration:none;opacity:0.9;transition:opacity var(--transition)}
.nav-brand:hover{opacity:1}
.nav-back{display:none;align-items:center;gap:8px;color:var(--text-dim);text-decoration:none;font-size:13px;font-weight:500;transition:color var(--transition);cursor:pointer;background:none;border:none;font-family:inherit}
.nav-back:hover{color:var(--gold)}
.nav-back svg{width:16px;height:16px}
.hero{padding:150px 24px 50px;text-align:center;position:relative}
.hero-title{font-size:clamp(2rem,6vw,4.2rem);font-weight:700;letter-spacing:-1px;background:linear-gradient(135deg,var(--gold) 0%,var(--gold-light) 25%,#fff 50%,var(--gold-light) 75%,var(--gold) 100%);background-size:400% 400%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 5s ease infinite}
@keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.hero-subtitle{margin-top:18px;font-size:clamp(0.85rem,1.8vw,1.1rem);color:var(--text-dim);font-weight:300;max-width:580px;margin-left:auto;margin-right:auto;line-height:1.7;letter-spacing:0.2px}
.search-wrap{max-width:480px;margin:44px auto 0;position:relative}
.search-input{width:100%;padding:16px 20px 16px 50px;background:var(--glass);border:1px solid var(--glass-border);border-radius:50px;color:var(--text);font-family:inherit;font-size:15px;outline:none;transition:all var(--transition)}
.search-input::placeholder{color:var(--text-dim)}
.search-input:focus{border-color:var(--gold);box-shadow:0 0 30px rgba(212,175,55,0.12),inset 0 0 10px rgba(212,175,55,0.03)}
.search-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--text-dim);pointer-events:none;transition:color var(--transition)}
.search-input:focus~.search-icon{color:var(--gold)}
.franchise-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px;padding:48px 24px 100px;max-width:1200px;margin:0 auto}
.franchise-card{position:relative;border-radius:var(--radius);overflow:hidden;cursor:pointer;aspect-ratio:16/9;display:flex;align-items:flex-end;padding:28px;background:var(--bg2);border:1px solid var(--glass-border);transition:all 0.4s cubic-bezier(0.4,0,0.2,1);transform:translateY(0)}
.franchise-card::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0.2) 0%,rgba(0,0,0,0.92) 100%);z-index:1}
.franchise-card::after{content:'';position:absolute;inset:0;opacity:0.2;z-index:0;transition:opacity var(--transition)}
.franchise-card:hover{transform:translateY(-6px) scale(1.02);border-color:var(--glass-border-hover);box-shadow:0 24px 80px rgba(0,0,0,0.6),0 0 40px rgba(212,175,55,0.06)}
.franchise-card:hover::after{opacity:0.3}
.franchise-card-content{position:relative;z-index:2}
.franchise-card-title{font-size:1.5rem;font-weight:700;margin-bottom:6px;letter-spacing:-0.3px}
.franchise-card-count{font-size:0.78rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.5px;font-weight:500}
.franchise-card[data-franchise="marvel"]::after{background:linear-gradient(135deg,#e23636 0%,#8b0000 50%,#1a1a2e 100%)}
.franchise-card[data-franchise="dc"]::after{background:linear-gradient(135deg,#0077b6 0%,#003d5c 50%,#1a1a2e 100%)}
.franchise-card[data-franchise="starwars"]::after{background:linear-gradient(135deg,#ffe81f 0%,#8b7500 50%,#1a1a2e 100%)}
.franchise-card[data-franchise="dragonball"]::after{background:linear-gradient(135deg,#ff6b00 0%,#8b3a00 50%,#1a1a2e 100%)}
.franchise-card[data-franchise="monogatari"]::after{background:linear-gradient(135deg,#9b59b6 0%,#4a1a6b 50%,#1a1a2e 100%)}
.franchise-card[data-franchise="jojo"]::after{background:linear-gradient(135deg,#8e44ad 0%,#4a1a6b 50%,#1a1a2e 100%)}
.franchise-card[data-franchise="witcher"]::after{background:linear-gradient(135deg,#2ecc71 0%,#145a32 50%,#1a1a2e 100%)}
.franchise-card[data-franchise="marvel"] .franchise-card-title{color:#ff5252}
.franchise-card[data-franchise="dc"] .franchise-card-title{color:#64b5f6}
.franchise-card[data-franchise="starwars"] .franchise-card-title{color:#ffe81f}
.franchise-card[data-franchise="dragonball"] .franchise-card-title{color:#ffab40}
.franchise-card[data-franchise="monogatari"] .franchise-card-title{color:#ce93d8}
.franchise-card[data-franchise="jojo"] .franchise-card-title{color:#ba68c8}
.franchise-card[data-franchise="witcher"] .franchise-card-title{color:#81c784}
.no-results{text-align:center;padding:80px 24px;color:var(--text-dim);display:none}
.no-results h3{font-size:1.3rem;margin-bottom:10px;color:var(--text)}
.no-results p{font-size:0.9rem;line-height:1.5}
.detail-view{padding:110px 24px 100px;max-width:880px;margin:0 auto;display:none}
.detail-view.active{display:block;animation:zoomFadeIn 0.6s cubic-bezier(0.4,0,0.2,1)}
@keyframes zoomFadeIn{from{opacity:0;transform:scale(0.92) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.detail-header{margin-bottom:28px}
.detail-title{font-size:clamp(1.6rem,4vw,2.6rem);font-weight:700;margin-bottom:6px;letter-spacing:-0.5px}
.detail-meta{color:var(--text-dim);font-size:0.88rem}
.order-toggle{display:flex;gap:4px;padding:4px;background:var(--bg2);border-radius:50px;border:1px solid var(--glass-border);margin-bottom:28px;max-width:fit-content;flex-wrap:wrap}
.order-btn{padding:10px 22px;border-radius:50px;border:none;background:transparent;color:var(--text-dim);font-family:inherit;font-size:0.82rem;font-weight:500;cursor:pointer;transition:all var(--transition);white-space:nowrap}
.order-btn.active{background:var(--gold);color:var(--bg);font-weight:600;box-shadow:0 4px 15px rgba(212,175,55,0.3)}
.order-btn:hover:not(.active){color:var(--text)}
.progress-section{margin-bottom:32px;padding:22px 24px;background:var(--glass);border-radius:var(--radius);border:1px solid var(--glass-border);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.progress-label{font-size:0.82rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;font-weight:500}
.progress-pct{font-size:1.2rem;font-weight:700;color:var(--gold)}
.progress-bar{height:5px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;position:relative}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold),var(--gold-light));border-radius:3px;transition:width 0.6s cubic-bezier(0.4,0,0.2,1);position:relative;width:0}
.progress-fill.pulsing::after{content:'';position:absolute;right:0;top:-2px;bottom:-2px;width:20px;border-radius:50%;background:var(--gold-light);animation:glow-pulse 1.8s ease-in-out infinite;box-shadow:0 0 12px var(--gold)}
@keyframes glow-pulse{0%,100%{opacity:0.4;transform:scale(0.8)}50%{opacity:1;transform:scale(1.2)}}
.watch-time{margin-top:14px;display:flex;align-items:center;gap:8px;font-size:0.84rem;color:var(--text-dim)}
.watch-time span{color:var(--gold);font-weight:600;font-size:0.95rem}
.timeline{position:relative;padding-left:36px}
.timeline::before{content:'';position:absolute;left:11px;top:8px;bottom:8px;width:2px;background:linear-gradient(180deg,var(--gold) 0%,var(--gold-dim) 30%,var(--glass-border) 100%);border-radius:1px}
.timeline-item{position:relative;margin-bottom:10px;opacity:0;transform:translateX(-20px);animation:slideIn 0.4s ease forwards}
@keyframes slideIn{to{opacity:1;transform:translateX(0)}}
.timeline-item::before{content:'';position:absolute;left:-29px;top:20px;width:10px;height:10px;border-radius:50%;background:var(--bg3);border:2px solid var(--gold-dim);transition:all var(--transition);z-index:2}
.timeline-item.watched::before{background:var(--gold);border-color:var(--gold);box-shadow:0 0 8px rgba(212,175,55,0.4)}
.timeline-entry{padding:16px 20px;background:var(--glass);border:1px solid var(--glass-border);border-radius:12px;transition:all var(--transition);display:flex;align-items:flex-start;gap:14px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.timeline-entry:hover{border-color:var(--glass-border-hover);background:rgba(25,25,40,0.85);transform:translateX(4px)}
.entry-checkbox{flex-shrink:0;width:22px;height:22px;border-radius:5px;border:2px solid var(--glass-border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--transition);margin-top:1px}
.entry-checkbox:hover{border-color:var(--gold)}
.entry-checkbox.checked{background:var(--gold);border-color:var(--gold);box-shadow:0 2px 8px rgba(212,175,55,0.3)}
.entry-checkbox.checked::after{content:'✓';color:var(--bg);font-size:12px;font-weight:800}
.entry-content{flex:1;min-width:0}
.entry-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px}
.entry-number{font-size:0.72rem;font-weight:700;color:var(--gold);min-width:26px;opacity:0.8}
.entry-title{font-size:0.92rem;font-weight:600;line-height:1.3}
.entry-year{font-size:0.72rem;color:var(--text-dim);font-weight:400}
.entry-bottom{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.entry-duration{font-size:0.74rem;color:var(--text-dim)}
.entry-note{font-size:0.74rem;color:var(--text-dim);font-style:italic;opacity:0.8}
.entry-tag{font-size:0.62rem;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:0.5px}
.tag-essential{background:rgba(212,175,55,0.12);color:var(--gold);border:1px solid rgba(212,175,55,0.2)}
.tag-optional{background:rgba(100,100,120,0.15);color:var(--text-dim);border:1px solid rgba(100,100,120,0.2)}
.tag-skippable{background:rgba(200,50,50,0.1);color:#ef5350;border:1px solid rgba(200,50,50,0.15)}
.actions{display:flex;gap:12px;margin-top:32px;flex-wrap:wrap}
.btn{padding:13px 26px;border-radius:50px;border:none;font-family:inherit;font-size:0.84rem;font-weight:600;cursor:pointer;transition:all var(--transition);display:flex;align-items:center;gap:8px;letter-spacing:0.2px}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--bg)}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(212,175,55,0.3)}
.btn-outline{background:transparent;border:1px solid var(--glass-border);color:var(--text-dim)}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.home-view{transition:all 0.5s cubic-bezier(0.4,0,0.2,1)}
.home-view.hidden{opacity:0;transform:scale(0.93);pointer-events:none;position:absolute;width:100%}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--bg3);border:1px solid var(--gold);color:var(--text);padding:14px 28px;border-radius:50px;font-size:0.84rem;font-weight:500;z-index:1000;transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);pointer-events:none;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:0 8px 30px rgba(0,0,0,0.5)}
.toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:768px){
.franchise-grid{grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;padding:32px 16px 80px}
.hero{padding:120px 16px 36px}
.detail-view{padding:90px 16px 80px}
.order-toggle{flex-wrap:wrap}
.nav{padding:12px 16px}
.timeline{padding-left:30px}
.timeline-item::before{left:-23px}
}
@media(max-width:480px){
.franchise-grid{grid-template-columns:1fr;gap:14px}
.franchise-card{aspect-ratio:16/7}
.hero-title{font-size:1.7rem}
.actions{flex-direction:column}
.btn{justify-content:center;width:100%}
.entry-top{gap:4px}
.order-toggle{width:100%}
.order-btn{flex:1;text-align:center;padding:10px 12px;font-size:0.75rem}
}
</style>
</head>

<script>
;(function(){
"use strict";

/* ===== PARTICLES ===== */
var canvas=document.getElementById('particles');
var ctx=canvas.getContext('2d');
var particles=[];
var particleCount=50;

function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
resizeCanvas();
window.addEventListener('resize',resizeCanvas);

function createParticle(rand){
return{
x:Math.random()*canvas.width,
y:rand?Math.random()*canvas.height:canvas.height+10,
vx:(Math.random()-0.5)*0.25,
vy:-(Math.random()*0.35+0.08),
size:Math.random()*2.2+0.4,
opacity:Math.random()*0.45+0.05,
maxOpacity:Math.random()*0.45+0.1,
phase:Math.random()*Math.PI*2
};
}
for(var i=0;i<particleCount;i++)particles.push(createParticle(true));

function animateParticles(){
ctx.clearRect(0,0,canvas.width,canvas.height);
for(var i=0;i<particles.length;i++){
var p=particles[i];
p.x+=p.vx;
p.y+=p.vy;
p.phase+=0.01;
p.opacity=p.maxOpacity*(0.5+0.5*Math.sin(p.phase));
if(p.y<-20||p.x<-20||p.x>canvas.width+20){
particles[i]=createParticle(false);
continue;
}
ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fillStyle='rgba(212,175,55,'+p.opacity+')';
ctx.fill();
}
requestAnimationFrame(animateParticles);
}
animateParticles();

function renderGrid(filter){
var grid=document.getElementById('franchiseGrid');
var noRes=document.getElementById('noResults');
grid.innerHTML='';
var keys=Object.keys(franchises);
var count=0;
filter=(filter||'').toLowerCase().trim();
keys.forEach(function(key){
var f=franchises[key];
var searchTarget=(f.card+' '+f.name).toLowerCase();
if(filter&&searchTarget.indexOf(filter)===-1)return;
count++;
var card=document.createElement('div');
card.className='franchise-card';
card.setAttribute('data-franchise',key);
if(franchiseImages[key]){card.style.backgroundImage='url('+franchiseImages[key]+')';card.style.backgroundSize='cover';card.style.backgroundPosition='center';}
card.innerHTML='<div class="franchise-card-content"><div class="franchise-card-title">'+f.card+'</div><div class="franchise-card-count">'+f.count+'</div></div>';
card.addEventListener('click',function(){selectFranchise(key)});
grid.appendChild(card);
});
noRes.style.display=count===0?'block':'none';
}
renderGrid('');

var searchInput=document.getElementById('searchInput');
searchInput.addEventListener('input',function(){renderGrid(this.value)});

/* ===== SELECT FRANCHISE ===== */
function selectFranchise(key){
currentFranchise=key;
var f=franchises[key];
var orderKeys=Object.keys(f.orders);
currentOrder=orderKeys[0];

document.getElementById('detailTitle').textContent=f.name;
document.getElementById('detailMeta').textContent=f.count;

var toggle=document.getElementById('orderToggle');
toggle.innerHTML='';
orderKeys.forEach(function(ok){
var btn=document.createElement('button');
btn.className='order-btn'+(ok===currentOrder?' active':'');
btn.textContent=f.orders[ok].label;
btn.addEventListener('click',function(){
currentOrder=ok;
toggle.querySelectorAll('.order-btn').forEach(function(b){b.classList.remove('active')});
btn.classList.add('active');
renderTimeline();
});
toggle.appendChild(btn);
});

document.getElementById('homeView').classList.add('hidden');
var dv=document.getElementById('detailView');
dv.classList.remove('active');
void dv.offsetWidth;
dv.classList.add('active');
document.getElementById('backBtn').style.display='flex';
renderTimeline();
window.scrollTo({top:0,behavior:'smooth'});
}

/* ===== RENDER TIMELINE ===== */
function renderTimeline(){
var f=franchises[currentFranchise];
var items=f.orders[currentOrder].items;
var tl=document.getElementById('timeline');
tl.innerHTML='';

items.forEach(function(item,idx){
var watchKey=currentFranchise+'|'+currentOrder+'|'+idx;
var isWatched=!!watchedMap[watchKey];

var div=document.createElement('div');
div.className='timeline-item'+(isWatched?' watched':'');
div.style.animationDelay=(idx*0.04)+'s';

var tagClass=item.tag==='essential'?'tag-essential':item.tag==='optional'?'tag-optional':'tag-skippable';

div.innerHTML='<div class="timeline-entry">'+
'<div class="entry-checkbox'+(isWatched?' checked':'')+'" data-idx="'+idx+'"></div>'+
'<div class="entry-content">'+
'<div class="entry-top">'+
'<span class="entry-number">#'+(idx+1)+'</span>'+
'<span class="entry-title">'+item.t+'</span>'+
'<span class="entry-year">('+item.y+')</span>'+
'</div>'+
'<div class="entry-bottom">'+
'<span class="entry-duration">\u23F1 '+item.d+'</span>'+
'<span class="entry-note">'+item.note+'</span>'+
'<span class="entry-tag '+tagClass+'">'+item.tag+'</span>'+
'</div>'+
'</div></div>';

div.querySelector('.entry-checkbox').addEventListener('click',function(){
var k=currentFranchise+'|'+currentOrder+'|'+this.getAttribute('data-idx');
if(watchedMap[k]){delete watchedMap[k]}else{watchedMap[k]=true}
saveWatched();
renderTimeline();
});

tl.appendChild(div);
});

updateProgress(items);
}

/* ===== PROGRESS ===== */
function parseDuration(d){
var totalMin=0;
var hMatch=d.match(/~?(\d+(?:\.\d+)?)h/);
var mMatch=d.match(/(\d+)m/);
if(hMatch)totalMin+=parseFloat(hMatch[1])*60;
if(mMatch)totalMin+=parseInt(mMatch[1],10);
return totalMin;
}

function updateProgress(items){
var total=items.length;
var done=0;
items.forEach(function(_,idx){
var k=currentFranchise+'|'+currentOrder+'|'+idx;
if(watchedMap[k])done++;
});
var pct=total>0?Math.round(done/total*100):0;
document.getElementById('progressPct').textContent=pct+'%';
var fill=document.getElementById('progressFill');
fill.style.width=pct+'%';
if(pct>0&&pct<100){fill.classList.add('pulsing')}else{fill.classList.remove('pulsing')}

var totalMin=0;
items.forEach(function(item){totalMin+=parseDuration(item.d)});
var hrs=Math.floor(totalMin/60);
var mins=Math.round(totalMin%60);
var timeStr=hrs>0?(hrs+'h '+(mins>0?mins+'m':'')):(mins>0?mins+'m':'N/A');
document.getElementById('watchTime').textContent=timeStr;
}

/* ===== NAVIGATION ===== */
window._goHome=function(){
document.getElementById('detailView').classList.remove('active');
document.getElementById('homeView').classList.remove('hidden');
document.getElementById('backBtn').style.display='none';
currentFranchise=null;
currentOrder=null;
};

/* ===== SHARE ===== */
window._shareProgress=function(){
if(!currentFranchise)return;
var f=franchises[currentFranchise];
var items=f.orders[currentOrder].items;
var done=0;
items.forEach(function(_,idx){
var k=currentFranchise+'|'+currentOrder+'|'+idx;
if(watchedMap[k])done++;
});
var pct=items.length>0?Math.round(done/items.length*100):0;
var text='\uD83C\uDFAC '+f.name+' — '+f.orders[currentOrder].label+'\n'+
'Progress: '+done+'/'+items.length+' ('+pct+'%)\n'+
'Tracked with Heezo Watch Order Generator';
try{
navigator.clipboard.writeText(text).then(function(){showToast('Copied to clipboard!')}).catch(function(){showToast('Could not copy — try manually')});
}catch(e){showToast('Could not copy — try manually')}
};

/* ===== RESET ===== */
window._resetProgress=function(){
if(!currentFranchise)return;
var f=franchises[currentFranchise];
var items=f.orders[currentOrder].items;
items.forEach(function(_,idx){
var k=currentFranchise+'|'+currentOrder+'|'+idx;
delete watchedMap[k];
});
saveWatched();
renderTimeline();
showToast('Progress reset');
};

/* ===== TOAST ===== */
function showToast(msg){
var t=document.getElementById('toast');
t.textContent=msg;
t.classList.add('show');
setTimeout(function(){t.classList.remove('show')},2800);
}

})();
</script>
