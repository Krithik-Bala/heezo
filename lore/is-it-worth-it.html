var currentCategory = 'all';
var currentSearch = '';
var currentSort = 'newest';

function getFilteredVerdicts() {
  var filtered = verdicts.filter(function(v) {
    var matchesCategory = currentCategory === 'all' || v.category === currentCategory;
    var matchesSearch = v.title.toLowerCase().includes(currentSearch.toLowerCase());
    return matchesCategory && matchesSearch;
  });

  if (currentSort === 'newest') {
    filtered.sort(function(a, b) { return b.date.localeCompare(a.date); });
  } else if (currentSort === 'rating-high') {
    filtered.sort(function(a, b) {
      var avgB = (b.ratings.story + b.ratings.visuals + b.ratings.pacing + b.ratings.rewatch) / 4;
      var avgA = (a.ratings.story + a.ratings.visuals + a.ratings.pacing + a.ratings.rewatch) / 4;
      return avgB - avgA;
    });
  } else if (currentSort === 'rating-low') {
    filtered.sort(function(a, b) {
      var avgA = (a.ratings.story + a.ratings.visuals + a.ratings.pacing + a.ratings.rewatch) / 4;
      var avgB = (b.ratings.story + b.ratings.visuals + b.ratings.pacing + b.ratings.rewatch) / 4;
      return avgA - avgB;
    });
  }

  return filtered;
}

function renderGrid() {
  var grid = document.getElementById('verdictsGrid');
  var filtered = getFilteredVerdicts();

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-results">No titles found. Try a different search or category.</div>';
    return;
  }

  var html = '';
  filtered.forEach(function(v) {
    var badgeClass = v.verdict === 'watch' ? 'badge-watch' : v.verdict === 'skip' ? 'badge-skip' : 'badge-conditional';
    var badgeText = v.verdict === 'watch' ? 'WATCH IT' : v.verdict === 'skip' ? 'SKIP IT' : 'CONDITIONAL';
    var categoryLabel = v.category === 'tv' ? 'TV SHOW' : v.category.toUpperCase();

    html += '<div class="verdict-card ' + v.verdict + '" onclick="openModal(' + v.id + ')">';
    html += '<div class="card-header"><span class="card-category">' + categoryLabel + '</span>';
    html += '<span class="verdict-badge ' + badgeClass + '">' + badgeText + '</span></div>';
    html += '<h3 class="card-title">' + v.title + '</h3>';
    html += '<p class="card-summary">' + v.summary + '</p>';
    html += '</div>';
  });

  grid.innerHTML = html;
}

function openModal(id) {
  var v = verdicts.find(function(item) { return item.id === id; });
  if (!v) return;

  var badgeClass = v.verdict === 'watch' ? 'badge-watch' : v.verdict === 'skip' ? 'badge-skip' : 'badge-conditional';
  var badgeText = v.verdict === 'watch' ? '✓ WATCH IT' : v.verdict === 'skip' ? '✗ SKIP IT' : '⚡ CONDITIONAL';

  var html = '';
  html += '<h2 class="modal-title">' + v.title + '</h2>';
  html += '<span class="modal-verdict-badge ' + badgeClass + '">' + badgeText + '</span>';
  html += '<p class="modal-full-verdict">' + v.fullVerdict + '</p>';

  html += '<div class="modal-section"><p class="modal-section-title">Best For</p>';
  html += '<p class="modal-section-text">' + v.bestFor + '</p></div>';

  html += '<div class="modal-section"><p class="modal-section-title">Skip If</p>';
  html += '<p class="modal-section-text">' + v.skipIf + '</p></div>';

  html += '<div class="modal-section"><p class="modal-section-title">Watch Instead</p>';
  html += '<p class="modal-section-text">' + v.watchInstead + '</p></div>';

  html += '<div class="rating-bars">';
  var ratingLabels = { story: 'Story', visuals: 'Visuals', pacing: 'Pacing', rewatch: 'Rewatch Value' };
  Object.keys(ratingLabels).forEach(function(key) {
    var val = v.ratings[key];
    html += '<div class="rating-bar-item">';
    html += '<span class="rating-label">' + ratingLabels[key] + '</span>';
    html += '<div class="rating-track"><div class="rating-fill" style="width: ' + (val * 10) + '%"></div></div>';
    html += '<span class="rating-value">' + val + '/10</span>';
    html += '</div>';
  });
  html += '</div>';

  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

function handleFilterClick(e) {
  if (!e.target.classList.contains('filter-pill')) return;
  document.querySelectorAll('.filter-pill').forEach(function(p) { p.classList.remove('active'); });
  e.target.classList.add('active');
  currentCategory = e.target.dataset.category;
  renderGrid();
}

function handleSearch(e) {
  currentSearch = e.target.value;
  renderGrid();
}

function handleSort(e) {
  currentSort = e.target.value;
  renderGrid();
}

// Event Listeners
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});
document.querySelector('.filter-row').addEventListener('click', handleFilterClick);
document.getElementById('searchBar').addEventListener('input', handleSearch);
document.getElementById('sortSelect').addEventListener('change', handleSort);

// Initial render
renderGrid();
</script>
