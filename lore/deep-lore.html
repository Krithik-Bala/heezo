<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --obsidian: #0a0a0f;
  --obsidian-light: #12121a;
  --obsidian-card: #1a1a2e;
  --gold: #d4af37;
  --gold-light: #f4d03f;
  --gold-dark: #b8860b;
  --gold-gradient: linear-gradient(135deg, #d4af37, #f4d03f, #b8860b);
  --text-primary: #e8e6e3;
  --text-secondary: #9a9a9a;
  --text-muted: #5a5a6a;
  --glass-bg: rgba(26, 26, 46, 0.6);
  --glass-border: rgba(212, 175, 55, 0.15);
  --glass-border-hover: rgba(212, 175, 55, 0.4);
}

html { scroll-behavior: smooth; }

body {
  background: var(--obsidian);
  color: var(--text-primary);
  font-family: 'Space Grotesk', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1000;
  opacity: 0.5;
}

/* Navigation */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 100;
  backdrop-filter: blur(20px);
  background: rgba(10, 10, 15, 0.8);
  border-bottom: 1px solid rgba(212, 175, 55, 0.1);
}

.nav-brand {
  font-size: 1.2rem;
  font-weight: 700;
  background: var(--gold-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-decoration: none;
}

.nav-links {
  display: flex;
  gap: 24px;
  list-style: none;
}

.nav-links a {
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 400;
  transition: color 0.3s ease;
}

.nav-links a:hover { color: var(--gold); }

/* Hero */
.hero {
  padding: 140px 20px 60px;
  text-align: center;
  position: relative;
  z-index: 1;
}

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--gold);
  text-decoration: none;
  font-size: 0.85rem;
  margin-bottom: 24px;
  transition: opacity 0.3s;
}

.back-link:hover { opacity: 0.7; }

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  border: 1px solid var(--glass-border);
  border-radius: 100px;
  background: var(--glass-bg);
  backdrop-filter: blur(10px);
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--gold);
  margin-bottom: 24px;
}

.hero-title {
  font-size: clamp(2.5rem, 6vw, 4.5rem);
  font-weight: 700;
  line-height: 1.1;
  background: var(--gold-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 16px;
}

.hero-subtitle {
  font-size: 1.1rem;
  color: var(--text-secondary);
  max-width: 600px;
  margin: 0 auto;
  line-height: 1.6;
}

/* Hub Grid */
.hub-section {
  max-width: 1200px;
  margin: 0 auto;
  padding: 60px 20px 80px;
  position: relative;
  z-index: 1;
}

.hub-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 24px;
}

.hub-card {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  padding: 28px;
  backdrop-filter: blur(20px);
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  position: relative;
  overflow: hidden;
}

.hub-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0;
  transition: opacity 0.4s;
}

.hub-card:hover {
  border-color: var(--glass-border-hover);
  transform: translateY(-4px);
  box-shadow: 0 20px 60px rgba(212, 175, 55, 0.08);
}

.hub-card:hover::before { opacity: 1; }

.hub-card-franchise {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--gold);
  margin-bottom: 10px;
}

.hub-card-title {
  font-size: 1.2rem;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 8px;
}

.hub-card-desc {
  font-size: 0.85rem;
  color: var(--text-secondary);
  line-height: 1.5;
  margin-bottom: 16px;
}

.hub-card-meta {
  display: flex;
  gap: 16px;
  font-size: 0.75rem;
  color: var(--text-muted);
}

/* Deep Dive View */
.deep-dive-view {
  display: none;
  max-width: 1200px;
  margin: 0 auto;
  padding: 60px 20px 80px;
  position: relative;
  z-index: 1;
}

.deep-dive-view.active { display: flex; gap: 40px; }

.deep-dive-back {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--gold);
  text-decoration: none;
  font-size: 0.85rem;
  margin-bottom: 32px;
  cursor: pointer;
  background: none;
  border: none;
  font-family: 'Space Grotesk', sans-serif;
  transition: opacity 0.3s;
}

.deep-dive-back:hover { opacity: 0.7; }

/* Sidebar TOC */
.toc-sidebar {
  width: 250px;
  flex-shrink: 0;
  position: sticky;
  top: 100px;
  max-height: calc(100vh - 120px);
  overflow-y: auto;
  padding-right: 20px;
}

.toc-title {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--gold);
  margin-bottom: 16px;
}

.toc-list {
  list-style: none;
}

.toc-item {
  padding: 8px 12px;
  font-size: 0.8rem;
  color: var(--text-muted);
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: all 0.3s;
  border-radius: 0 6px 6px 0;
}

.toc-item:hover { color: var(--text-secondary); border-left-color: rgba(212, 175, 55, 0.3); }
.toc-item.active { color: var(--gold); border-left-color: var(--gold); background: rgba(212, 175, 55, 0.05); }

/* Content Area */
.deep-dive-content {
  flex: 1;
  min-width: 0;
}

.dd-header {
  margin-bottom: 40px;
}

.dd-title {
  font-size: clamp(1.8rem, 4vw, 2.5rem);
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 12px;
}

.dd-meta {
  display: flex;
  gap: 16px;
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-bottom: 24px;
}

/* TLDR Box */
.tldr-box {
  background: rgba(212, 175, 55, 0.05);
  border: 1px solid rgba(212, 175, 55, 0.2);
  border-radius: 12px;
  padding: 20px 24px;
  margin-bottom: 40px;
}

.tldr-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--gold);
  margin-bottom: 8px;
  font-weight: 600;
}

.tldr-text {
  font-size: 0.9rem;
  color: var(--text-secondary);
  line-height: 1.6;
}

/* Collapsible Sections */
.dd-section {
  margin-bottom: 8px;
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  overflow: hidden;
  transition: border-color 0.3s;
}

.dd-section:hover { border-color: rgba(212, 175, 55, 0.25); }

.dd-section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 24px;
  cursor: pointer;
  background: rgba(26, 26, 46, 0.3);
  transition: background 0.3s;
}

.dd-section-header:hover { background: rgba(26, 26, 46, 0.6); }

.dd-section-title {
  font-size: 1rem;
  font-weight: 500;
  color: var(--text-primary);
}

.dd-section-toggle {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--gold);
  transition: transform 0.3s;
  font-size: 1.2rem;
}

.dd-section.open .dd-section-toggle { transform: rotate(45deg); }

.dd-section-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

.dd-section.open .dd-section-body { max-height: 2000px; }

.dd-section-content {
  padding: 0 24px 24px;
  font-size: 0.9rem;
  color: var(--text-secondary);
  line-height: 1.8;
}

.dd-section-content p { margin-bottom: 12px; }

.gold-term {
  color: var(--gold);
  font-weight: 500;
}

/* Footer */
.footer {
  padding: 60px 20px;
  text-align: center;
  position: relative;
  z-index: 1;
  border-top: 1px solid rgba(212, 175, 55, 0.1);
}

.footer-brand {
  font-size: 1.5rem;
  font-weight: 700;
  background: var(--gold-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 12px;
}

.footer-text {
  color: var(--text-muted);
  font-size: 0.8rem;
}

/* Responsive */
@media (max-width: 1024px) {
  .toc-sidebar { display: none; }
  .deep-dive-view.active { flex-direction: column; }
}

@media (max-width: 768px) {
  .nav { padding: 16px 20px; }
  .hub-grid { grid-template-columns: 1fr; }
  .dd-section-header { padding: 14px 18px; }
  .dd-section-content { padding: 0 18px 18px; }
}

@media (max-width: 480px) {
  .nav-links { display: none; }
}
</style>

    sections: [
      {
        title: "The Sacred Timeline & Its Collapse",
        content: "<p>The <span class='gold-term'>Sacred Timeline</span> was never about one 'correct' path — it was about preventing any timeline from producing a Kang variant. He Who Remains pruned branches not because free will was wrong, but because free will inevitably creates Kangs, and Kangs inevitably create multiversal war.</p><p>When Sylvie killed He Who Remains at the Citadel at the End of Time, she didn't just free the timeline — she reopened the door to infinite Kang variants. The TVA continued existing but lost its purpose, becoming a rogue organization in a multiverse it no longer controlled. Loki's sacrifice to hold the timelines together as a living nexus delayed the inevitable but didn't prevent it.</p><p>The key concept: <span class='gold-term'>The Threshold</span>. Not every branch produces a Kang. Only branches that pass a critical threshold of technological advancement + specific genetic lineage create the conditions for a Kang to emerge. This is why some timelines are left alone while others are pruned.</p>"

        title: "Kang Variants: A Taxonomy",
        content: "<p>Understanding the Multiverse Saga requires understanding that Kang is not one villain — he's a <span class='gold-term'>concept</span> that manifests differently across timelines. Here's the hierarchy:</p><p><span class='gold-term'>He Who Remains</span> — The 'winner' of the first Multiversal War. Benevolent dictator who created the TVA. Now dead. <span class='gold-term'>Kang the Conqueror</span> — The warrior variant. Exiled to the Quantum Realm, defeated by Scott Lang, but his death triggered the Council of Kangs. <span class='gold-term'>Rama-Tut</span> — The explorer variant who ruled ancient Egypt. Less malevolent, more curious. <span class='gold-term'>Immortus</span> — The oldest variant who's seen every outcome and seeks only to prevent the worst ones. <span class='gold-term'>The Scarlet Centurion</span> — The strategist variant working behind Secret Wars.</p><p>The critical reveal: all Kangs share one fear — <span class='gold-term'>Doom</span>. In timelines where Victor Von Doom achieves sufficient power before a Kang emerges, the Kang variant is eliminated. This is why Doom becomes central to Secret Wars.</p>"
      },
      {
        title: "Incursions: When Universes Collide",
        content: "<p>An <span class='gold-term'>incursion</span> occurs when the boundary between two universes erodes to the point of collision. Unlike Kang variants (which are created through branching), incursions are caused by <span class='gold-term'>anchoring events</span> — moments where someone from one universe spends too long in another, creating a gravitational pull between realities.</p><p>Doctor Strange's actions in Multiverse of Madness created multiple incursion points. America Chavez's portal-punching weakened barriers. Spider-Man's multiversal visitors in No Way Home were early symptoms. Each event alone was survivable, but cumulatively they've made Earth-616 an <span class='gold-term'>incursion magnet</span>.</p><p>The Illuminati of Earth-838 knew this. Their Strange destroyed an entire universe to prevent an incursion from reaching them. This is the central moral question of Secret Wars: when two universes are colliding and only one can survive, who decides which one dies?</p>"
      },
      {
        title: "The Road to Secret Wars",
        content: "<p>Secret Wars in the MCU follows the 2015 comic event's structure: multiple universes collapse into a single <span class='gold-term'>Battleworld</span> ruled by whoever has the power to hold reality together. In comics, that was Doom. The MCU is tracking the same direction.</p><p>The convergence path: Kang variants destabilize the multiverse through war → incursions accelerate as barriers weaken → universes begin colliding → a Beyonder-level event forces all surviving realities into one space → whoever controls that space becomes God-Emperor of Battleworld.</p><p>The Avengers' role isn't to prevent Secret Wars (it's already inevitable) — it's to ensure the reconstruction afterward creates a <span class='gold-term'>livable multiverse</span> rather than a dictatorship. This is why the team must grow: you need heroes from multiple universes working together to prevent any single entity from controlling the rebuild.</p>"

        title: "Post-Secret Wars: What Survives",
        content: "<p>Marvel has confirmed that Secret Wars is a <span class='gold-term'>soft reboot point</span>. Not everything carries forward. The mechanism: when Battleworld is disassembled and reality is reconstructed, only elements with sufficient 'narrative weight' (read: audience investment and story potential) survive into the new continuity.</p><p>This is how Marvel solves its continuity bloat. Characters whose stories are complete can end. Recasts happen naturally — it's a new universe. Contradictions are erased. But emotional continuity persists: characters remember who they were, even if the specifics change. It's not a hard reset — it's an evolution.</p><p>The key players who bridge old and new: whoever holds an <span class='gold-term'>Infinity Stone</span> during reconstruction maintains full memory. This is why the stones' 'destruction' in the main timeline may not be permanent — they're needed as anchors for the rebuild.</p>"

    tldr: "The Void Century (800-900 years ago) saw the Ancient Kingdom — a technologically advanced, D-clan civilization — wage war against the Twenty Kingdoms alliance. The Ancient Kingdom lost, the World Government formed, and all records were erased. The Poneglyphs are their final message. Joy Boy made a promise to the merfolk he couldn't keep. The One Piece is likely the full truth of this history, meant to unite the world against the lies.",
    sections: [
      {
        title: "What We Know For Certain",
        content: "<p>Oda has confirmed these facts through the manga directly: The <span class='gold-term'>Void Century</span> spans exactly 100 years, roughly 800-900 years before the current story. During this period, the <span class='gold-term'>Twenty Kingdoms</span> (ancestors of today's World Nobles/Celestial Dragons) allied against a single opposing force. That force lost, and the Twenty Kingdoms established the World Government.</p><p>The winners then did something unprecedented: they <span class='gold-term'>erased all historical records</span> of those 100 years. Researching it is punishable by death (Ohara's Buster Call). The only surviving records are the <span class='gold-term'>Poneglyphs</span> — indestructible stone tablets written in an ancient language, scattered across the world by the losing side as a final act of preservation.</p><p>The <span class='gold-term'>Ancient Weapons</span> (Pluton, Poseidon, Uranus) existed during this era. Joy Boy was a key figure who made a promise to Fish-Man Island that he failed to keep. The 'D' initial carried by certain bloodlines is connected to the Ancient Kingdom. And Laugh Tale — the final island — contains the full truth, which made Roger's crew laugh.</p>"

      {
        title: "The Ancient Kingdom: Reconstructing a Lost Civilization",
        content: "<p>From scattered evidence across 1000+ chapters, we can reconstruct the <span class='gold-term'>Ancient Kingdom's</span> nature: They possessed technology far beyond current One Piece standards. The Pluton blueprints (kept in Water 7 for centuries) show warship engineering that modern shipwrights can barely comprehend. The ability to inscribe Poneglyphs on indestructible material suggests material science beyond anything existing.</p><p>The kingdom valued <span class='gold-term'>freedom and connection</span> between races. Joy Boy's promise to the merfolk, the kingdom's apparent alliance with multiple races (giants, fishmen, minks, skypieans), and the 'D' carriers' consistent personality trait of valuing freedom all point to an ideology of liberation and unity.</p><p>Their flag likely bore the same symbol as the <span class='gold-term'>Sun Pirates' jolly roger</span> — a sun. Fisher Tiger unknowingly recreated an ancient symbol of freedom. The kingdom's name may be the word 'D' itself stands for — <span class='gold-term'>Dawn</span>. They were the kingdom of Dawn, and the 'Will of D' is literally the will to bring dawn (freedom/truth) back to the world.</p><p>Geographically, the kingdom likely existed where <span class='gold-term'>Mary Geoise</span> now stands. The World Government built their seat of power directly atop the ruins of their enemy — both as a statement and to hide evidence. The National Treasure that Im-sama guards in the Pangaea Castle may be a remnant of this kingdom.</p>"
      },
      {
        title: "The War: Why The Ancient Kingdom Lost",
        content: "<p>The Ancient Kingdom had superior technology (Ancient Weapons), allied races (giants, fishmen, minks), and what appears to be the <span class='gold-term'>power of the Nika fruit</span> on their side. So why did they lose? The answer lies in their ideology versus their enemies' tactics.</p><p>The Twenty Kingdoms coalition won through <span class='gold-term'>numbers, betrayal, and willingness to commit atrocity</span>. The Ancient Kingdom's strength was also its weakness: they valued all life and freedom. They wouldn't use the Ancient Weapons to their full, genocidal potential. The Twenty Kingdoms had no such restraint.</p><p>Evidence suggests <span class='gold-term'>internal betrayal</span> played a role. The Nefertari family (Vivi's ancestors) were among the Twenty Kingdoms but refused to ascend to Mary Geoise afterward — suggesting they defected mid-war or were originally allied with the Ancient Kingdom before being forced to switch sides.</p><p>Joy Boy's 'failure' wasn't military — it was a <span class='gold-term'>promise of evacuation</span> he couldn't fulfill. He promised to raise Fish-Man Island to the surface (Noah's purpose), reuniting fishmen with the surface world. The war's outcome prevented this. His apology, written on the Poneglyph in Fish-Man Island, is an apology for failing to keep that specific promise before the kingdom fell.</p>"

      {
        title: "The One Piece: What's On Laugh Tale",
        content: "<p>Roger found it and laughed. The crew named the island 'Laugh Tale' because of this reaction. This tells us the treasure is not purely material wealth, nor purely tragic history. It's something that, in context, is <span class='gold-term'>absurdly ironic or joyfully defiant</span>.</p><p>The leading theory supported by textual evidence: The One Piece is <span class='gold-term'>Joy Boy's message to the future</span> — the complete, unedited history of the Void Century combined with a plan to reunite the world. It probably includes the locations/activation methods for all Ancient Weapons, the truth about the World Government's founding lie, and Joy Boy's dream (the same dream Luffy, Roger, and Ace share — to throw the biggest party in the world where everyone is free).</p><p>Why Roger laughed: he arrived <span class='gold-term'>too early</span>. The plan requires specific conditions — Poseidon (a mermaid princess born once every few centuries) must be alive, and someone with the Nika fruit must reach Laugh Tale. Roger had neither. He was 'too early' for Joy Boy's grand plan. The absurdity of finding the answer to everything but being unable to act on it — that's the joke. That's why he laughed.</p><p>The 'One Piece' name itself is likely literal: the <span class='gold-term'>one piece of history</span> that connects everything, or the act of making the world 'one piece' again — reuniting the Red Line-divided world into a single connected ocean, destroying Mary Geoise, and fulfilling Joy Boy's promise to bring all races together.</p>"

        content: "<p>The <span class='gold-term'>Shattering</span> is the central event of Elden Ring's story, and its cause is Marika's most complex decision. On the surface: Marika shattered the Elden Ring, breaking divine law, and the resulting shards (Great Runes) were claimed by her demigod children who then warred over them. But why?</p><p>The trigger was the <span class='gold-term'>Night of the Black Knives</span> — the assassination of Godwyn the Golden (Marika's firstborn son) using a fragment of stolen Destined Death. Godwyn's soul died but his body lived, creating the first 'Those Who Live in Death.' This broke Marika's most fundamental law (no death) and corrupted her son into a spreading undead plague beneath the Erdtree's roots.</p><p>Marika's response was calculated rage. She shattered the Ring not in despair, but as <span class='gold-term'>rebellion against the Greater Will</span>. The Greater Will's order had failed her son. Its perfect system allowed this corruption. By shattering the Ring, she simultaneously punished the system, distributed power away from a single controlling entity, and — critically — created the conditions for a <span class='gold-term'>Tarnished</span> champion to eventually reforge reality according to a new vision.</p><p>This is why the Greater Will imprisoned her within the Erdtree and her own other half (Radagon) was tasked with trying to repair the Ring. Marika wanted it broken. Radagon wanted it whole. They are the same body at war with itself — the ultimate metaphor for a god in conflict with their own divine mandate.</p>"

    sections: [
      {

        content: "<p><span class='gold-term'>Order 66</span> was executed in 19 BBY, simultaneously across the entire galaxy. Clone troopers received the order and turned on their Jedi commanders mid-battle. The genius of Palpatine's plan was its simplicity: the clones didn't choose this. The inhibitor chips made it neurological — not a betrayal of friendship, but an override of free will.</p><p>At the Jedi Temple on Coruscant, <span class='gold-term'>Anakin Skywalker</span> (now Darth Vader) led the 501st Legion in slaughtering everyone within — including younglings, padawans, temple guards, and librarians. The Temple's distress beacon was altered to broadcast a message calling all surviving Jedi home — a trap that Obi-Wan and Yoda barely avoided and then reversed.</p><p>In the immediate hours, the survival rate depended on three factors: distance from clone troopers at the moment of execution, awareness that something was wrong (Force sensitivity helped), and access to a ship or hiding place. Jedi on the front lines died fastest. Those on solo missions, remote postings, or who had already distanced themselves from the Order fared better.</p>"

      {

        content: "<p><span class='gold-term'>Cere Junda</span> — Cal's mentor figure, a Jedi Knight who cut herself off from the Force after being tortured and inadvertently leading the Empire to hidden younglings. Reconnected with the Force, became a Jedi Master, and died confronting Vader directly to buy Cal time. <span class='gold-term'>Quinlan Vos</span> — A Jedi known for walking the dark side's edge. Confirmed survived Order 66 (referenced in Obi-Wan show). His post-Order 66 activities remain largely unexplored but he's confirmed alive and helping hidden Force-sensitives.</p><p><span class='gold-term'>Naq Med</span> — Survived in the Unknown Regions, went completely off-grid. <span class='gold-term'>Oppo Rancisis</span> — Council member who survived initially but was eventually hunted down by Vader. <span class='gold-term'>Coleman Kcaj</span> — Council member confirmed survived 66, fate afterward unknown. <span class='gold-term'>Jocasta Nu</span> — The Jedi librarian survived the Temple assault, attempted to preserve Jedi knowledge, and was killed by Vader when she tried to access the Temple archives one final time.</p><p><span class='gold-term'>Luminara Unduli</span> — Survived 66 but was captured, not killed. The Empire kept her alive in a prison, using her Force presence as bait to lure other surviving Jedi. She was eventually executed, and her bones were used as a continued lure (encountered by the Ghost crew in Rebels).</p>"

      {

        content: "<p>Palpatine didn't rely on Vader alone to finish the purge. He created the <span class='gold-term'>Inquisitorius</span> — a cadre of dark-side wielders, all former Jedi who fell or were tortured into submission. Led by the Grand Inquisitor (a former Temple Guard), they were trained to hunt and kill Force-sensitives.</p><p>Key Inquisitors: The <span class='gold-term'>Grand Inquisitor</span> (Pau'an Temple Guard), <span class='gold-term'>Second Sister</span> (Trilla Suduri, Cere's former padawan — tortured into serving), <span class='gold-term'>Third Sister</span> (Reva Sevander, a youngling who survived the Temple massacre by playing dead and infiltrated the Inquisitors seeking revenge on Vader), <span class='gold-term'>Fifth Brother</span>, <span class='gold-term'>Seventh Sister</span>, <span class='gold-term'>Ninth Sister</span>.</p><p>The Inquisitors were deliberately kept weak compared to Vader — Palpatine ensured none could challenge his apprentice. Their lightsabers' spinning feature was designed for intimidation against weakened, traumatized survivors rather than dueling at full Jedi Knight capacity. They were effective against padawans and isolated knights, but struggled against masters or coordinated resistance.</p>"

      {
        title: "Legacy: What the Survivors Preserved",
        content: "<p>The survivors of Order 66 collectively ensured the Jedi's <span class='gold-term'>knowledge and philosophy</span> wasn't completely extinguished. Obi-Wan and Yoda trained Luke. Ahsoka preserved operational knowledge and Clone Wars-era tactics. Kanan trained Ezra. Cal preserved a Holocron of Force-sensitive children (though he destroyed it to protect them).</p><p>But they also passed on <span class='gold-term'>trauma</span>. Luke's training was rushed and incomplete because his teachers were broken men. The sequel trilogy's Jedi problems stem directly from Order 66's survivors teaching from a place of fear and loss rather than the full tradition. Ben Solo's fall echoes this — trained by a Luke who inherited the paranoia of masters who'd watched their entire order murdered.</p><p>The philosophical question Order 66 raises in canon: was the <span class='gold-term'>Jedi Order's structure</span> itself part of the problem? Their rigidity, their political entanglement, their suppression of attachment — did these create the conditions for their destruction? Survivors like Ahsoka (who left the Order) and Kanan (who embraced love and attachment) suggest that surviving required abandoning orthodox Jedi doctrine. The future of the Jedi, whatever form it takes, will be shaped by survivors who learned that the old way was unsustainable.</p>"

    id: "dragon-ball-power-scaling",
    franchise: "Dragon Ball",
    title: "Dragon Ball Power Scaling: Why It Actually Makes Sense",
    desc: "A defense of DB's scaling system. It's not broken — you're just reading it wrong.",
    readTime: "9 min read",
    wordCount: "~1,800 words",
    tldr: "Dragon Ball power scaling works if you accept three rules: 1) Ki control matters more than raw power, 2) Transformations are multipliers on a base that's always growing, 3) The series tracks martial arts skill separately from energy output. Most 'plot holes' dissolve when you stop treating power levels as the only metric.",
    sections: [
      {
        title: "The Misconception: Power Levels Are Not The System",
        content: "<p>Here's what most people get wrong: they think <span class='gold-term'>power levels</span> ARE Dragon Ball's scaling system. They're not. Power levels were a narrative device Toriyama introduced specifically to <span class='gold-term'>discredit</span> them. Vegeta's 'It's over 9000!' moment wasn't establishing a measurement system — it was showing a character who relied too heavily on numbers getting beaten by someone whose power fluctuated with emotion and technique.</p><p>After the Frieza Saga, scouters (and by extension, fixed power levels) are explicitly abandoned. Characters stop quantifying power numerically because Toriyama is telling you: <span class='gold-term'>the numbers don't capture what actually determines fights</span>. Ki sensing replaces scouters precisely because it gives qualitative, contextual information rather than a single misleading number.</p><p>The actual scaling system in Dragon Ball is multidimensional: raw energy output (what scouters measure), <span class='gold-term'>ki control efficiency</span> (how much of your power you can deploy at will), technique/martial arts skill, battle IQ and adaptability, transformation multipliers, and stamina/ki reserves. A fighter with lower raw power can win if they're superior in other dimensions.</p>"
      },
      {
        title: "Ki Control: The Hidden Variable",
        content: "<p><span class='gold-term'>Ki control</span> is Dragon Ball's most overlooked scaling factor. It explains nearly every 'plot hole' fans complain about. The concept: raw power is meaningless if you can't control it efficiently. Goku's mastery of ki control is what actually makes him the strongest, not his base power level.</p><p>Examples: <span class='gold-term'>Super Saiyan Grade 3</span> (Ultra Trunks) had higher raw power than Cell but lost because the form sacrificed speed and ki efficiency for bulk. Cell recognized this instantly — power without control is useless. Goku and Gohan's strategy of mastering base Super Saiyan (making it feel 'natural') was superior because it maintained full ki efficiency at a high power output.</p><p><span class='gold-term'>Ultra Instinct</span> is the ultimate expression of this: it's not a power boost (initially), it's perfect ki control — the body reacts with exactly the necessary force, zero waste, zero thought. It's Toriyama's thesis statement on what 'strength' means in Dragon Ball: not the biggest blast, but the most efficient application of available power.</p><p>This also explains why Krillin can still meaningfully participate in combat despite being astronomically weaker in raw terms — his <span class='gold-term'>ki manipulation techniques</span> (Destructo Disc, Solar Flare) bypass power differentials through precision and cleverness. Technique > raw power is a consistent Dragon Ball theme.</p>"
      },
      {
        title: "Transformations: Multipliers, Not Replacements",
        content: "<p>Every transformation in Dragon Ball operates as a <span class='gold-term'>multiplier on base power</span>. This is critical for understanding scaling across arcs. When Goku trains and increases his base power from 100 to 1,000, every transformation built on that base increases proportionally.</p><p>The known multipliers (stated or derived): <span class='gold-term'>Super Saiyan</span> = 50x base. <span class='gold-term'>SS2</span> = 2x SS1 (100x base). <span class='gold-term'>SS3</span> = 4x SS2 (400x base). <span class='gold-term'>Super Saiyan God</span> = ???x (massive jump, possibly 10,000x+ base given it rivals universe-busting Beerus). <span class='gold-term'>Super Saiyan Blue</span> = SS1 multiplier applied to God ki (50x SSG). <span class='gold-term'>Ultra Instinct</span> = not a multiplier but an efficiency state that makes any form approach 100% output.</p><p>This multiplicative system explains why early enemies become trivial later without it being a 'plot hole.' Frieza at his peak (~120 million power level) would be insignificant against Namek Saga SSJ Goku grown to current base levels, because Goku's base has been multiplied thousands of times over through decades of training and transformations stacking on an ever-growing foundation.</p>"
      },
      {
        title: "Why 'Inconsistencies' Aren't Inconsistencies",
        content: "<p>Common complaint: 'If Goku is universal level, why does he struggle with bullets/get hurt by a rock?' Answer: <span class='gold-term'>ki reinforcement is active, not passive</span>. Dragon Ball characters aren't inherently invulnerable — they reinforce their bodies with ki. When their guard is down (sleeping, relaxed, caught off-guard), their durability drops to near-human levels. This is explicitly stated multiple times in the manga.</p><p>Goku getting hurt by a laser in Super wasn't a plot hole — he had <span class='gold-term'>actively powered down and dropped his guard</span>. Frieza's soldier caught him completely off-guard. Whis specifically lectures him about this. It's not inconsistent — it's the established system working as described.</p><p>Common complaint: 'Why can't planet-busters destroy planets in every fight?' Answer: <span class='gold-term'>ki control and directionality</span>. Fighters focus their energy into directed attacks at opponents, not omnidirectional explosions. Goku vs. Beerus's clash waves that threatened the universe? They learned to <span class='gold-term'>nullify the excess energy</span> mid-fight, directing only what was needed at each other. This isn't convenient writing — it's the ki control system demonstrating mastery.</p><p>The Battle of Gods arc explicitly addresses universal-scale power: Goku and Beerus punching each other creates shockwaves that ripple outward, threatening to destroy everything. Goku then figures out how to <span class='gold-term'>match the angle and force precisely</span> to cancel the destructive waves while maintaining combat power. This is the series telling you directly: control, not output, defines strength at the highest levels.</p>"
      },
      {
        title: "The Grand Unified Theory: Toriyama's Intent",
        content: "<p>Toriyama's consistent message across all of Dragon Ball is this: <span class='gold-term'>obsessing over numerical power is the villain's mistake</span>. Frieza, Cell, Buu (initially), Jiren — they all believed in raw supremacy. The heroes win through adaptability, creativity, bonds, and efficiency. The power scaling 'makes sense' because it's not trying to be a video game stat sheet.</p><p>Dragon Ball is a <span class='gold-term'>martial arts story</span> wearing science fiction clothing. In martial arts, a smaller fighter beats a larger one through technique. A tired fighter loses to a fresh one. A predictable fighter loses to an adaptable one. Dragon Ball applies these martial arts truths at cosmic scale — the fundamentals don't change just because the numbers get bigger.</p><p>The Daima series reinforces this perfectly: de-aged Goku at lower power than his adult form still wins fights through <span class='gold-term'>experience, technique, and battle IQ</span>. The series hasn't forgotten its thesis. It's fans who've been misreading it by treating scouter numbers as gospel instead of recognizing them as the villains' flawed framework from day one.</p>"
      }
    ]

    id: "witcher-timeline",

    title: "The Witcher Timeline: Books vs Show vs Games",
    desc: "Three canons, three timelines, one Geralt. Here's how they connect (and where they don't).",
    readTime: "11 min read",
    wordCount: "~2,200 words",
    tldr: "The books are the original canon. The games are a non-canon sequel to the books. The Netflix show is a loose adaptation of the books with major deviations. They share characters and lore but diverge significantly in plot, characterization, and timeline. Treat them as three parallel interpretations rather than one continuous story.",
    sections: [
      {
        title: "The Book Timeline: Sapkowski's Canon",
        content: "<p>The <span class='gold-term'>book canon</span> consists of two short story collections (The Last Wish, Sword of Destiny) and five novels (Blood of Elves through The Lady of the Lake), plus a prequel (Season of Storms). The timeline spans roughly 1248-1268 in the Witcher calendar.</p><p>Key events in order: Geralt meets Yennefer at a banquet gone wrong (The Last Wish). Geralt invokes the Law of Surprise and 'claims' Ciri by destiny (Sword of Destiny). The Nilfgaardian Empire invades the Northern Kingdoms, triggering the main saga. Geralt takes Ciri to Kaer Morhen for Witcher training, then to Yennefer for magical education. The Lodge of Sorceresses attempts to control Ciri for her Elder Blood. Ciri bounces between worlds, timelines, and captors. The saga climaxes at <span class='gold-term'>Stygga Castle</span> and a pogrom in Rivia where Geralt 'dies' — impaled by a pitchfork during a riot.</p><p>The books end ambiguously: Geralt and Yennefer may be dead, transported to an afterlife, or healed by Ciri's Elder Blood powers. Sapkowski intentionally left it open. This ambiguity is what allowed CD Projekt Red to create their sequel games.</p>"
      },
      {
        title: "The Game Timeline: CDPR's Continuation",
        content: "<p>CD Projekt Red's trilogy begins approximately <span class='gold-term'>5 years after the books end</span>, treating the ambiguous ending as 'Geralt survived but lost his memory.' This is non-canon to Sapkowski (he's stated the games aren't part of his story), but they're internally consistent and respectful of book lore.</p><p><span class='gold-term'>The Witcher 1</span> (2007): Amnesiac Geralt returns to Kaer Morhen, deals with political intrigue in Temeria, and slowly recovers fragments of memory. <span class='gold-term'>The Witcher 2: Assassins of Kings</span> (2011): Geralt is accused of assassinating kings, navigates Northern Kingdom politics, and confronts the Wild Hunt's machinations. <span class='gold-term'>The Witcher 3: Wild Hunt</span> (2015): Geralt searches for Ciri (who has returned from her dimension-hopping), confronts the Wild Hunt, and gets multiple possible endings based on player choice.</p><p>The games add significant lore that doesn't exist in books: expanded Skellige culture, deeper Wild Hunt mythology, Gaunter O'Dimm (a god-level entity), the Hearts of Stone and Blood and Wine expansions' storylines. None of this contradicts the books — it extends into territory Sapkowski didn't cover.</p>"
      },
      {
        title: "The Show Timeline: Netflix's Adaptation",
        content: "<p>The Netflix show <span class='gold-term'>began as a book adaptation</span> but progressively diverged, especially after Henry Cavill's departure. Season 1 adapted short stories with a multi-timeline structure. Season 2 heavily modified Blood of Elves. Season 3 loosely covered Time of Contempt. Seasons 4-5 (with Liam Hemsworth) continue diverging.</p><p>Major deviations from books: <span class='gold-term'>Yennefer's backstory</span> is massively expanded (and changed — her sacrifice of fertility is reversed, contradicting a core book theme). <span class='gold-term'>Cahir</span> is reimagined as more sympathetic earlier. <span class='gold-term'>Eskel</span> is killed in Season 2 (alive much longer in books). The Voleth Meir plot is entirely show-original. Ciri's characterization shifts significantly — more active fighter, less political chess piece.</p><p>The show's timeline is the most compressed: events that span years in books happen in weeks or months. This creates pacing issues where character development feels rushed and political situations escalate unnaturally fast. The multi-timeline structure of Season 1 (which confused many viewers) was the show's most ambitious structural choice, though it was abandoned afterward.</p>"
      },
      {
        title: "Where They Contradict Each Other",
        content: "<p><span class='gold-term'>Geralt's Character</span>: Book Geralt is verbose, philosophical, and emotionally complex — he talks constantly and uses deflection humor. Game Geralt captures this well through dialogue choices. Show Geralt (Cavill era) was reduced to grunts and 'Hmm' — a simplification that became iconic but isn't book-accurate. </p><p><span class='gold-term'>Yennefer's Agency</span>: In books, Yen is already powerful and established when we meet her — her trauma is backstory that informs but doesn't define her. The show made her origin story a central plot, rewriting her journey to power. The games treat her as book-established but give her less screen time than Triss (a gameplay decision that caused fan-division).</p><p><span class='gold-term'>The Wild Hunt</span>: Books treat them as Aen Elle (elves from another dimension) who want Ciri's Elder Blood for conquest. Games expand this into a full apocalyptic threat. The show has only begun introducing them. The threat level differs dramatically: books = dangerous raiders, games = extinction-level threat, show = TBD.</p><p><span class='gold-term'>Magic System</span>: Books have a relatively grounded magic system with clear costs. Games gamify it into Signs (simplified combat magic) plus full spells. The show's magic is visually spectacular but inconsistent in rules — what magic can and can't do changes based on plot needs.</p>"
      },
      {
        title: "How to Experience Them: A Recommendation",
        content: "<p>The ideal order for a complete Witcher experience: <span class='gold-term'>Books first</span> (The Last Wish → Sword of Destiny → Blood of Elves → Time of Contempt → Baptism of Fire → Tower of the Swallow → Lady of the Lake → Season of Storms). This gives you the 'true' canon and the deepest characterization.</p><p>Then <span class='gold-term'>games</span> (Witcher 3 alone is fine if you don't want to play dated earlier titles — the journal catches you up). The games are the most satisfying 'ending' to Geralt's story because you choose it yourself. Blood and Wine is widely considered the perfect send-off.</p><p>The show is <span class='gold-term'>optional and separate</span>. Watch it as its own thing — an alternate universe interpretation. If you go in expecting book accuracy, you'll be frustrated. If you accept it as 'inspired by' rather than 'adaptation of,' it's an entertaining dark fantasy show with excellent production design and a perfect casting of Jaskier/Dandelion.</p><p>The key insight: these are <span class='gold-term'>three parallel universes sharing DNA</span>, not one continuous canon. Enjoy each on its own terms. The books are literature. The games are interactive storytelling at its peak. The show is mainstream entertainment. None invalidates the others.</p>"
      }
    ]
  },

    html += '<h3 class="hub-card-title">' + dive.title + '</h3>';
    html += '<p class="hub-card-desc">' + dive.desc + '</p>';
    html += '<div class="hub-card-meta"><span>📖 ' + dive.readTime + '</span><span>📝 ' + dive.wordCount + '</span></div>';
    html += '</div>';
  });
  grid.innerHTML = html;
}

function openDeepDive(id) {
  var dive = deepDives.find(function(d) { return d.id === id; });
  if (!dive) return;

  document.getElementById('hubSection').style.display = 'none';
  var view = document.getElementById('deepDiveView');
  view.classList.add('active');

  // Build TOC
  var tocHtml = '<p class="toc-title">Table of Contents</p><ul class="toc-list">';
  dive.sections.forEach(function(section, i) {
    tocHtml += '<li class="toc-item" data-index="' + i + '" onclick="scrollToSection(' + i + ')">' + section.title + '</li>';
  });
  tocHtml += '</ul>';
  document.getElementById('tocSidebar').innerHTML = tocHtml;

  // Build Content
  var contentHtml = '';
  contentHtml += '<button class="deep-dive-back" onclick="backToHub()">← Back to Archive</button>';
  contentHtml += '<div class="dd-header">';
  contentHtml += '<h1 class="dd-title">' + dive.title + '</h1>';
  contentHtml += '<div class="dd-meta"><span>📖 ' + dive.readTime + '</span><span>📝 ' + dive.wordCount + '</span><span>🏷️ ' + dive.franchise + '</span></div>';
  contentHtml += '</div>';

  contentHtml += '<div class="tldr-box"><p class="tldr-label">TL;DR</p><p class="tldr-text">' + dive.tldr + '</p></div>';

  dive.sections.forEach(function(section, i) {
    contentHtml += '<div class="dd-section" id="section-' + i + '">';
    contentHtml += '<div class="dd-section-header" onclick="toggleSection(' + i + ')">';
    contentHtml += '<span class="dd-section-title">' + section.title + '</span>';
    contentHtml += '<span class="dd-section-toggle">+</span>';
    contentHtml += '</div>';
    contentHtml += '<div class="dd-section-body"><div class="dd-section-content">' + section.content + '</div></div>';
    contentHtml += '</div>';
  });

  document.getElementById('deepDiveContent').innerHTML = contentHtml;
  window.scrollTo({ top: 0, behavior: 'smooth' });

  // Auto-open first section
  setTimeout(function() { toggleSection(0); }, 300);
}

function backToHub() {
  document.getElementById('hubSection').style.display = 'block';
  document.getElementById('deepDiveView').classList.remove('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleSection(index) {
  var section = document.getElementById('section-' + index);
  if (!section) return;

  var wasOpen = section.classList.contains('open');
  section.classList.toggle('open');

  // Update TOC active state
  document.querySelectorAll('.toc-item').forEach(function(item) { item.classList.remove('active'); });
  if (!wasOpen) {
    var tocItem = document.querySelector('.toc-item[data-index="' + index + '"]');
    if (tocItem) tocItem.classList.add('active');
  }
}

function scrollToSection(index) {
  var section = document.getElementById('section-' + index);
  if (!section) return;

  if (!section.classList.contains('open')) {
    toggleSection(index);
  }

  section.scrollIntoView({ behavior: 'smooth', block: 'start' });

  document.querySelectorAll('.toc-item').forEach(function(item) { item.classList.remove('active'); });
  var tocItem = document.querySelector('.toc-item[data-index="' + index + '"]');
  if (tocItem) tocItem.classList.add('active');
}

// Initialize
renderHub();
</script>
</body>
