name: Heezo Daily Publisher

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CONTENT_BOT_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests google-genai

      - name: Generate and publish article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          KEY1: ${{ secrets.KEY1 }}
          KEY2: ${{ secrets.KEY2 }}
          KEY3: ${{ secrets.KEY3 }}
          KEY4: ${{ secrets.KEY4 }}
          KEY5: ${{ secrets.KEY5 }}
          HE1: ${{ secrets.HE1 }}
          HE2: ${{ secrets.HE2 }}
          HE3: ${{ secrets.HE3 }}
          HE4: ${{ secrets.HE4 }}
        run: python scripts/cloud_publisher.py

      - name: Commit and push
        run: |
          git config user.name "Heezo Bot"
          git config user.email "heezoverse@gmail.com"
          git add .
          git diff --cached --quiet || (git commit -m "New article via cloud publisher" && git push)

      - name: Discord notification
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -H "Content-Type: application/json" -X POST "$DISCORD_WEBHOOK_URL" \
            -d '{"embeds":[{"title":"New Article Published!","description":"A new article was just auto-published on Heezo!\n\n[Read it](https://heezo.vercel.app/lore/articles)","color":13938487,"footer":{"text":"Heezo Auto-Publisher"}}]}'
