name: Heezo Daily Publisher

on:
  schedule:
    # Runs at 6:00 AM UTC = 11:30 AM IST — primary publisher
    - cron: '0 6 * * *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CONTENT_BOT_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests google-generativeai

      - name: Generate and publish article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/cloud_publisher.py

      - name: Commit and push
        run: |
          git config user.name "Heezo Bot"
          git config user.email "heezoverse@gmail.com"
          git add .
          git diff --cached --quiet || (git commit -m "📰 Daily article via cloud publisher" && git push)
